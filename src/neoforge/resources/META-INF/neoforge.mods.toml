modLoader="kotlinforforge"
loaderVersion="[6,)"
license="MIT"
issueTrackerURL="https://github.com/L3-N0X/no-fog-perfected/issues"

[[mods]]
modId="no_fog_perfected"
version="${version}"
displayName="No Fog Perfected"
authors="L3-N0X"
description='''
Removes fog from Minecraft, perfected.
'''

[[dependencies.no_fog_perfected]]
    modId="neoforge"
    type="required"
    versionRange="${neoforge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.no_fog_perfected]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[modproperties.no_fog_perfected]
    "sodium:config_api_user" = "de.lenox.client.NoFogSodiumConfig"

[[mixins]]
    config="no-fog-perfected.neoforge.mixins.json"
