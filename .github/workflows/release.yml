name: Publish Multi-Version Mod

on:
  # Trigger automatically when a version tag is pushed (e.g., git tag v1.0.0 && git push --tags)
  push:
    tags:
      - 'v*'
      - '*.*.*'

  # Manual trigger as a fallback
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type (stable, beta, alpha)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
          - alpha

jobs:
  publish:
    name: Publish to Modrinth and CurseForge
    runs-on: ubuntu-latest

    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
#      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      # Automatically determine release type: if manually triggered, use input. If tagged, assume stable.
      RELEASE_TYPE: ${{ github.event.inputs.release_type || 'stable' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # Run the native publishMods task. Stonecutter intercepts this and applies it to all versions.
      - name: Publish All Versions
        run: ./gradlew publishMods --stacktrace
